word: Reasoning models
type: noun
author: Jon Keegan
last_updated: "Last updated: March 4, 2026"
tags:
- Foundational concepts
definition_list:
  - text:  >- 
       Reasoning models are AI models that use a "chain of thought" process to break down complex quries into step-by-step tasks. 

       
       The models often generate a readable "inner monologue" that lets users see how it is tackling a problem, which is also used to help evaluate the performance of the model.


       Reasoning models, along with other innovations in training helped push a breakthrough in AI model performance, and became widely used across the industry. 


       Journalists should know that "reasoning" is a term that anthropomorphizes this technology and can give readers a mistaken impression that these generative AI models are actually thinking (they are not). Large language models are probablistic systems that generate text based on patterns in data. But the term has been popularized and does describe a particular kind of AI model. 


       Reasoning models also use exponentially more computational resources that traidtional AI models, resulting in much higher energy use, and increased expense. 
